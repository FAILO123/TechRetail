version: "3.8"
services:
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    networks:
      - techretail_net
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
  backend:
    image: node:18-alpine
    networks:
      - techretail_net
    deploy:
      replicas: 2
    secrets:
      - db_password
  database:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_DATABASE: techretail_db
    networks:
      - techretail_net
    volumes:
      - db_data:/var/lib/mysql
    deploy:
      placement:
        constraints: [node.role == manager]
    secrets:
      - db_password
  cache:
    image: redis:7-alpine
    networks:
      - techretail_net
  visualizer:
    image: dockersamples/visualizer
    ports:
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    deploy:
      placement:
        constraints: [node.role == manager]
networks:
  techretail_net:
    driver: overlay
volumes:
  db_data:
secrets:
  db_password:
    external: true
